name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4

      - name: Verify formatting
        run: |
          files="$(gofmt -l .)"
          test -z "$files" || {
            printf '%s\n' "$files"
            exit 1
          }

      - name: Run vet
        run: |
          if go list ./... 2>/dev/null | grep -q .; then
            go vet ./...
          fi

      - name: Run tests
        run: |
          if go list ./... 2>/dev/null | grep -q .; then
            go test ./...
          fi

      - name: Run race tests
        run: |
          if go list ./... 2>/dev/null | grep -q .; then
            go test -race ./...
          fi

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build API image
        run: docker build --tag file-upload-service:test .

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4

      - name: Start local platform
        run: make services-up

      - name: Verify schema constraints
        run: make schema-check

      - name: Verify PostgreSQL API key resolver
        env:
          UPLOAD_API_TEST_DATABASE_URL: postgres://file_upload:local-development-only@127.0.0.1:5432/file_upload?sslmode=disable
        run: go test ./internal/auth -run 'PostgreSQLResolverIntegration|KeyCreatorIntegration|KeyRevokerIntegration'

      - name: Verify upload repository
        env:
          UPLOAD_API_TEST_DATABASE_URL: postgres://file_upload:local-development-only@127.0.0.1:5432/file_upload?sslmode=disable
        run: go test ./internal/files -run 'RepositoryCreateUploadIntegration|RepositoryMarkReadyIntegration|RepositoryCompleteUploadIntegration|RepositoryDeleteUploadIntegration|RepositoryGetUploadsIntegration|RepositoryListUploadsIntegration'

      - name: Verify multipart repository
        env:
          UPLOAD_API_TEST_DATABASE_URL: postgres://file_upload:local-development-only@127.0.0.1:5432/file_upload?sslmode=disable
        run: go test ./internal/files -run 'MultipartRepository'

      - name: Verify SeaweedFS presigner
        env:
          UPLOAD_API_TEST_SEAWEEDFS_URL: http://127.0.0.1:8333
        run: go test ./internal/storage -run PresignerIntegration

      - name: Verify health endpoints
        run: |
          curl --fail --silent http://127.0.0.1:8080/health/live
          curl --fail --silent http://127.0.0.1:8080/health/ready

      - name: Show service logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local platform
        if: always()
        run: docker compose down --volumes
