name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4

      - name: Verify formatting
        run: |
          files="$(gofmt -l .)"
          test -z "$files" || {
            printf '%s\n' "$files"
            exit 1
          }

      - name: Run vet
        run: |
          if go list ./... 2>/dev/null | grep -q .; then
            go vet ./...
          fi

      - name: Run tests
        run: |
          if go list ./... 2>/dev/null | grep -q .; then
            go test ./...
          fi

      - name: Run race tests
        run: |
          if go list ./... 2>/dev/null | grep -q .; then
            go test -race ./...
          fi

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build API image
        run: docker build --tag file-upload-service:test .
