services:
  upload-api:
    build:
      context: .
    environment:
      UPLOAD_API_DATABASE_URL: postgres://file_upload:${POSTGRES_PASSWORD:-local-development-only}@postgres:5432/${POSTGRES_DB:-file_upload}?sslmode=disable
      UPLOAD_API_HOST: 0.0.0.0
      UPLOAD_API_NATS_HEALTH_URL: http://nats:8222/healthz
      UPLOAD_API_PORT: 8080
      UPLOAD_API_SEAWEEDFS_HEALTH_URL: http://seaweedfs:9333/cluster/status
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --output-document=/dev/null
        - http://127.0.0.1:8080/health/ready
      interval: 2s
      timeout: 3s
      retries: 15
    init: true

  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-file_upload}
      POSTGRES_USER: ${POSTGRES_USER:-file_upload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - postgres-data:/var/lib/postgresql

  seaweedfs:
    image: chrislusf/seaweedfs:4.33
    command:
      - mini
      - -dir=/data
    environment:
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_ACCESS_KEY:-local-access-key}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_SECRET_KEY:-local-secret-key}
      S3_BUCKET: ${SEAWEEDFS_BUCKET:-file-upload}
    ports:
      - "127.0.0.1:8333:8333"
      - "127.0.0.1:9333:9333"
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - http://127.0.0.1:9333/cluster/status
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - seaweedfs-data:/data

  nats:
    image: nats:2.14.2-alpine
    command:
      - -js
      - -sd
      - /data
      - -m
      - "8222"
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --spider
        - http://127.0.0.1:8222/healthz
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - nats-data:/data

volumes:
  nats-data:
  postgres-data:
  seaweedfs-data:
